name: ci

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: pip install numpy sqlite-vec pytest
      - name: Run update-tool tests
        run: pytest update/tools/tests -v
      - name: Shell syntax checks
        run: |
          bash -n install.sh
          bash -n update/tools/rollback.sh
